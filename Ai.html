<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography Scenario Challenge</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e293b, #334155);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      background: rgba(255, 255, 255, 0.08);
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
    }

    p {
      line-height: 1.6;
    }

    .scenario-box {
      background: rgba(255, 255, 255, 0.12);
      padding: 20px;
      border-radius: 14px;
      margin: 25px 0;
      font-size: 1.1rem;
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      padding: 14px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      transition: 0.2s ease;
    }

    button:hover {
      background-color: #0ea5e9;
      transform: translateY(-2px);
    }

    .secondary-btn {
      background-color: #facc15;
      color: #111827;
      margin-top: 20px;
    }

    .secondary-btn:hover {
      background-color: #eab308;
    }

    .result {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: bold;
      min-height: 28px;
    }

    .score {
      margin-top: 15px;
      font-size: 1rem;
      color: #cbd5e1;
    }

    .nav-link {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 18px;
      background: white;
      color: #0f172a;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .nav-link:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Photography Scenario Challenge</h1>
    <p>
      Test your photography instincts. Read the scenario, pick the best choice,
      and see how many you can get right.
    </p>

    <div class="scenario-box" id="scenarioBox">
      Click “Start Challenge” to get your first photography scenario.
    </div>

    <div class="choices" id="choices"></div>

    <div class="result" id="result"></div>
    <div class="score" id="score">Score: 0 / 0</div>

    <button class="secondary-btn" onclick="nextScenario()">Start Challenge</button>

    <br />
    <a class="nav-link" href="fromscratch.html">Back to Scratch Page</a>
  </div>

  <script>
    const scenarios = [
      {
        question: "You are shooting a fast skier going downhill in bright daylight. What matters most?",
        choices: [
          "Use a faster shutter speed",
          "Use the lowest screen brightness",
          "Turn off autofocus",
          "Use a 10-second timer"
        ],
        answer: "Use a faster shutter speed"
      },
      {
        question: "You want a blurry background for a portrait. What is the best choice?",
        choices: [
          "Use a wider aperture like f/1.8",
          "Use the smallest image size",
          "Increase your ISO as high as possible",
          "Use black and white mode"
        ],
        answer: "Use a wider aperture like f/1.8"
      },
      {
        question: "You are shooting at sunset and your image is too dark. What is a good fix?",
        choices: [
          "Raise ISO or slow shutter speed",
          "Delete the photo immediately",
          "Turn the camera off and on",
          "Only zoom in more"
        ],
        answer: "Raise ISO or slow shutter speed"
      },
      {
        question: "You want a super wide landscape shot with your Sony a6400 setup. Which lens style is best?",
        choices: [
          "Wide-angle lens",
          "Telephoto sports lens",
          "Macro-only lens",
          "No lens at all"
        ],
        answer: "Wide-angle lens"
      },
      {
        question: "You are taking photos indoors with low light and lots of motion. What combination helps most?",
        choices: [
          "Fast lens and higher ISO",
          "Lower battery percentage",
          "Manual focus only and low ISO",
          "Smaller memory card"
        ],
        answer: "Fast lens and higher ISO"
      },
      {
        question: "What is usually the best composition tip for a more interesting photo?",
        choices: [
          "Use the rule of thirds",
          "Always put everything dead center",
          "Only shoot from eye level",
          "Never include foreground"
        ],
        answer: "Use the rule of thirds"
      }
    ];

    let currentScenario = null;
    let score = 0;
    let total = 0;

    function shuffleChoices(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function nextScenario() {
      const randomIndex = Math.floor(Math.random() * scenarios.length);
      currentScenario = scenarios[randomIndex];

      document.getElementById("scenarioBox").textContent = currentScenario.question;
      document.getElementById("result").textContent = "";

      const choicesContainer = document.getElementById("choices");
      choicesContainer.innerHTML = "";

      const shuffled = shuffleChoices(currentScenario.choices);

      shuffled.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice;
        btn.onclick = () => checkAnswer(choice);
        choicesContainer.appendChild(btn);
      });
    }

    function checkAnswer(selected) {
      total++;

      const result = document.getElementById("result");

      if (selected === currentScenario.answer) {
        score++;
        result.textContent = "Correct — nice choice.";
        result.style.color = "#86efac";
      } else {
        result.textContent = "Not quite. Best answer: " + currentScenario.answer;
        result.style.color = "#fca5a5";
      }

      document.getElementById("score").textContent = `Score: ${score} / ${total}`;

      const buttons = document.querySelectorAll("#choices button");
      buttons.forEach(btn => btn.disabled = true);

      setTimeout(() => {
        nextScenario();
      }, 1800);
    }
  </script>
</body>
</html>
